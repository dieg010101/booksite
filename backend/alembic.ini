# Alembic configuration file.
# ============================================================================
#
# This file tells Alembic:
#   1. Where to find migration scripts (script_location)
#   2. How to connect to the database (sqlalchemy.url)
#   3. How to format migration filenames
#
# The sqlalchemy.url here is a FALLBACK. The env.py file overrides it
# with the DATABASE_URL environment variable (or the default from
# app/database.py) so you never need to edit credentials in this file.
#
# Usage:
#   alembic upgrade head          — apply all pending migrations
#   alembic downgrade -1          — roll back the last migration
#   alembic revision --autogenerate -m "description"  — generate a new migration
#   alembic history               — show migration history
#   alembic current               — show current database revision
#
# ============================================================================

[alembic]
# Path to migration scripts (relative to this file).
script_location = alembic

# Template for migration filenames. Includes the revision hash and a
# slug of the description for human readability.
# Example: 20260322_a1b2c3d4_initial_schema.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for file_template date stamps.
timezone = UTC

# Truncate long revision hashes in filenames to this many characters.
truncate_slug_length = 40

# Set to 'true' to run migrations in a transaction per migration file.
# This is the default and recommended setting.
transaction_per_migration = true

# ── Database URL (fallback — overridden by env.py) ──
# This is only used if env.py doesn't set the URL programmatically.
# In practice, env.py always overrides this with DATABASE_URL from the
# environment or the default from app/database.py.
sqlalchemy.url = postgresql://postgres:localpassword@localhost:5432/book_platform

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S